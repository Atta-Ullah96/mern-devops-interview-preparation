<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Semantic HTML Example</title>
  </head>
  <body>
    <header>
      <h1>Storix</h1>
      <nav aria-label="Main navigation">
        <a href="#features">Features</a>
        <a href="#pricing">Pricing</a>
        <a href="#contact">Contact</a>
      </nav>
    </header>

    <main>
      <section id="features">
        <h2>Features</h2>
        <p>Upload, preview, and manage files securely.</p>
      </section>

      <article>
        <h2>How Storix Works</h2>
        <p>Storix stores file metadata in the database and files in cloud storage.</p>
      </article>

      <aside>
        <h2>Tip</h2>
        <p>Use semantic HTML to improve accessibility and SEO.</p>
      </aside>
    </main>

    <footer id="contact">
      <p>Contact: support@example.com</p>
    </footer>
  </body>
</html>
