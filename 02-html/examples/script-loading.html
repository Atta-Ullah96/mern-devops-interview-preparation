<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Script Loading Example</title>

    <!-- Main app script: use defer because it may need the DOM -->
    <script src="main.js" defer></script>

    <!-- Independent third-party script: async is okay -->
    <script src="analytics.js" async></script>
  </head>
  <body>
    <h1>Script Loading</h1>
    <p>Use defer for app scripts and async for independent scripts.</p>
  </body>
</html>
