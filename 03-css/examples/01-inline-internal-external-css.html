<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Inline Internal External CSS</title>

  <!-- External CSS -->
  <link rel="stylesheet" href="style.css" />

  <!-- Internal CSS -->
  <style>
    .internal-heading {
      color: green;
    }
  </style>
</head>
<body>
  <!-- Inline CSS -->
  <h1 style="color: red;">This heading uses inline CSS</h1>

  <h2 class="internal-heading">This heading uses internal CSS</h2>

  <p class="external-text">This paragraph uses external CSS.</p>
</body>
</html>
