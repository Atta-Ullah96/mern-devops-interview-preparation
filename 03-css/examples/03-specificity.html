<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CSS Specificity</title>
  <link rel="stylesheet" href="specificity.css" />
</head>
<body>
  <p id="intro" class="text">This text will be red because ID has higher specificity.</p>

  <div class="card">
    <p class="message">This text will be orange because .card .message has higher specificity.</p>
  </div>

  <p class="same-rule">This text will be purple because later rule wins when specificity is same.</p>
</body>
</html>
